<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inventory Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">

    <h1 class="text-center text-primary">Inventory Management System</h1>
    <p class="text-center">Dynamic Inventory using HTML5, Bootstrap & JavaScript DOM</p>
    <hr>

    <div class="alert alert-info">
        <strong>Total Items:</strong> <span id="totalItems">0</span>
    </div>

    <!-- Add Item -->
    <div class="card mb-3">
        <div class="card-header bg-success text-white">Add New Item</div>
        <div class="card-body">
            <div class="row g-2">
                <div class="col-md-4"><input type="text"   id="itemName"  class="form-control" placeholder="Item Name"/></div>
                <div class="col-md-4"><input type="number" id="itemPrice" class="form-control" placeholder="Price"/></div>
                <div class="col-md-4"><input type="number" id="itemQty"   class="form-control" placeholder="Quantity"/></div>
            </div>
            <button class="btn btn-primary mt-2" onclick="addItem()">Add Item</button>
        </div>
    </div>

    <!-- Inventory Table -->
    <div class="card">
        <div class="card-header bg-dark text-white">Inventory Items</div>
        <div class="card-body">
            <table class="table table-bordered table-striped">
                <thead class="table-secondary">
                    <tr><th>Item Name</th><th>Price</th><th>Quantity</th><th>Action</th></tr>
                </thead>
                <tbody id="inventoryTable"></tbody>
            </table>
        </div>
    </div>

</div>

<script>
    let total = 0;

    function addItem() {
        let name  = document.getElementById("itemName").value.trim();
        let price = document.getElementById("itemPrice").value.trim();
        let qty   = document.getElementById("itemQty").value.trim();

        if (!name || !price || !qty) { alert("Please fill all fields"); return; }

        let row = document.createElement("tr");
        row.innerHTML = `<td>${name}</td><td>₹${price}</td><td>${qty}</td>
            <td><button class="btn btn-danger btn-sm" onclick="removeItem(this)">Remove</button></td>`;

        document.getElementById("inventoryTable").appendChild(row);
        document.getElementById("totalItems").textContent = ++total;

        document.getElementById("itemName").value  = "";
        document.getElementById("itemPrice").value = "";
        document.getElementById("itemQty").value   = "";
    }

    function removeItem(btn) {
        btn.closest("tr").remove();
        document.getElementById("totalItems").textContent = --total;
    }
</script>
</body>
</html>
